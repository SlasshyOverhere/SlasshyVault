name: Nightly Build

on:
  push:
    branches: [nightly]
  workflow_dispatch:

jobs:
  nightly:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [windows-latest]

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install dependencies
        run: npm ci

      - name: Prebuild WAN test binary
        run: cargo build --manifest-path src-tauri/Cargo.toml --release --bin wt_tauri_wan_test --features wan-test

      - name: Set nightly version
        shell: pwsh
        run: |
          $date = Get-Date -Format 'yyyyMMdd'
          $version = "3.0.45-nightly.$date"
          npm version --no-git-tag-version $version
          npm run version:sync
          echo "Building version: $version"

      - name: Merge nightly config
        shell: pwsh
        run: |
          $base = Get-Content -Raw src-tauri/tauri.conf.json | ConvertFrom-Json
          $nightly = Get-Content -Raw src-tauri/tauri.conf.nightly.json | ConvertFrom-Json
          $merged = $base | ConvertTo-Json -Depth 10 | ConvertFrom-Json

          function Merge-Deep($target, $source) {
            foreach ($prop in $source.PSObject.Properties) {
              if ($prop.Value -is [PSCustomObject]) {
                if ($null -eq $target.$($prop.Name)) { $target | Add-Member -NotePropertyName $prop.Name -NotePropertyValue @{} }
                Merge-Deep $target.$($prop.Name) $prop.Value
              } else {
                $target.$($prop.Name) = $prop.Value
              }
            }
          }

          Merge-Deep $merged $nightly
          $merged | ConvertTo-Json -Depth 10 | Set-Content src-tauri/tauri.conf.nightly-merged.json

      - name: Generate nightly release notes
        id: release_notes
        shell: pwsh
        run: |
          $date = Get-Date -Format 'yyyy-MM-dd'
          $body = @"
          ## Nightly Build - $date

          ⚠️ This is a pre-release build for testing purposes only. Not for production use.

          **Changes included:**
          - Latest commits from the nightly branch
          - Experimental features and fixes
          "@
          "notes<<EOF" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          $body | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "EOF" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
          VITE_AI_SIGNATURE_SECRET: ${{ secrets.VITE_AI_SIGNATURE_SECRET }}
          VITE_IS_NIGHTLY: 'true'
        with:
          args: --config src-tauri/tauri.conf.nightly-merged.json --bundles nsis,updater
          tagName: nightly
          releaseName: 'SlasshyVault Nightly'
          releaseBody: ${{ steps.release_notes.outputs.notes }}
          prerelease: true
