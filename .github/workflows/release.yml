name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [windows-latest]

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Run frontend tests
        run: pnpm test

      - name: Type check
        run: pnpm exec tsc --noEmit

      - name: Run lint
        run: pnpm run lint

      - name: Generate release notes
        id: release_notes
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          git fetch --tags --force
          $previousTag = $null
          try {
            $previousTag = (git describe --tags --abbrev=0 "$tag^" 2>$null).Trim()
          } catch {}

          $body = @{
            tag_name = $tag
          }
          if ($previousTag) {
            $body.previous_tag_name = $previousTag
          }

          $headers = @{
            Authorization = "Bearer ${{ secrets.GITHUB_TOKEN }}"
            Accept = "application/vnd.github+json"
            "X-GitHub-Api-Version" = "2022-11-28"
          }

          $response = Invoke-RestMethod -Method Post -Uri "https://api.github.com/repos/${{ github.repository }}/releases/generate-notes" -Headers $headers -Body ($body | ConvertTo-Json)
          $notes = $response.body
          if (-not $notes) {
            $notes = "## What's Changed`n`n- Release notes were not generated."
          }

          "notes<<EOF" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          $notes | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "EOF" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        with:
          args: --bundles nsis,updater
          tagName: ${{ github.ref_name }}
          releaseName: 'SlasshyVault ${{ github.ref_name }}'
          releaseBody: ${{ steps.release_notes.outputs.notes }}
          releaseDraft: false
          prerelease: false
