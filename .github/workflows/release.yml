name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [windows-latest]

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install dependencies
        run: npm ci

      - name: Prebuild WAN test binary
        run: cargo build --manifest-path src-tauri/Cargo.toml --release --bin wt_tauri_wan_test --features wan-test

      - name: Generate release notes
        id: release_notes
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          git fetch --tags --force
          $previousTag = $null
          try {
            $previousTag = (git describe --tags --abbrev=0 "$tag^" 2>$null).Trim()
          } catch {}

          $logRange = if ($previousTag) { "$previousTag..$tag" } else { "HEAD" }
          $commits = git log $logRange --oneline --no-decorate
          $notes = if ($commits) {
            "## What's Changed`n" + ($commits | ForEach-Object { "- $_" }) -join "`n"
          } else {
            "## What's Changed`n`n- Release notes were not generated."
          }

          "notes<<EOF" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          $notes | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "EOF" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
          VITE_AI_SIGNATURE_SECRET: ${{ secrets.VITE_AI_SIGNATURE_SECRET }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        with:
          args: --bundles nsis,updater
          tagName: ${{ github.ref_name }}
          releaseName: 'SlasshyVault ${{ github.ref_name }}'
          releaseBody: ${{ steps.release_notes.outputs.notes }}
          releaseDraft: false
          prerelease: false

      - name: Verify updater artifacts
        if: always()
        shell: pwsh
        run: |
          $bundleDir = "src-tauri/target/release/bundle"
          Write-Host "=== Full bundle tree ==="
          Get-ChildItem -Path $bundleDir -Recurse -ErrorAction SilentlyContinue

          $nsisZip = Get-ChildItem -Path $bundleDir -Recurse -Filter "*.nsis.zip" -ErrorAction SilentlyContinue
          if ($nsisZip) {
            Write-Host "=== NSIS ZIP contents ==="
            foreach ($zip in $nsisZip) {
              Write-Host "`n--- $($zip.FullName) ---"
              $zipFile = $zip.FullName
              $tempDir = Join-Path $env:TEMP "nsis_verify_$([System.IO.Path]::GetRandomFileName())"
              try {
                Expand-Archive -Path $zipFile -DestinationPath $tempDir -Force
                Get-ChildItem -Path $tempDir -Recurse | ForEach-Object {
                  Write-Host "$($_.FullName)  $($_.Length) bytes"
                }
              } finally {
                Remove-Item -Path $tempDir -Recurse -Force -ErrorAction SilentlyContinue
              }
            }
          } else {
            Write-Host "=== No .nsis.zip found ==="
          }

          Write-Host "=== Installer artifact sizes ==="
          Get-ChildItem -Path $bundleDir -Recurse -Include "*.exe", "*.msi", "*.zip", "*.tar.gz", "*.rpm", "*.deb", "*.AppImage" -ErrorAction SilentlyContinue |
            Sort-Object Length -Descending |
            ForEach-Object { Write-Host "$($_.Length.ToString('N0')) bytes  $($_.FullName)" }