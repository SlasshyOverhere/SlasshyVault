name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write
    runs-on: windows-2022

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Run frontend tests
        run: pnpm test

      - name: Type check
        run: pnpm exec tsc --noEmit

      - name: Run lint
        run: pnpm run lint

      - name: Generate release notes
        id: release_notes
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          git fetch --tags --force
          $previousTag = $null
          try {
            $previousTag = (git describe --tags --abbrev=0 "$tag^" 2>$null).Trim()
          } catch {}

          $body = @{
            tag_name = $tag
          }
          if ($previousTag) {
            $body.previous_tag_name = $previousTag
          }

          $headers = @{
            Authorization = "Bearer ${{ secrets.GITHUB_TOKEN }}"
            Accept = "application/vnd.github+json"
            "X-GitHub-Api-Version" = "2022-11-28"
          }

          $response = Invoke-RestMethod -Method Post -Uri "https://api.github.com/repos/${{ github.repository }}/releases/generate-notes" -Headers $headers -Body ($body | ConvertTo-Json)
          $notes = $response.body
          if (-not $notes) {
            $notes = "## What's Changed`n`n- Release notes were not generated."
          }

          "notes<<EOF" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          $notes | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "EOF" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Install working NSIS
        shell: pwsh
        run: |
          choco install nsis -y --no-progress
          $nsisCache = "$env:LOCALAPPDATA\tauri\NsisUser-x86_64"
          New-Item -ItemType Directory -Force -Path $nsisCache | Out-Null
          Copy-Item "${env:ProgramFiles(x86)}\NSIS\*" $nsisCache -Recurse -Force

      - name: Build auxiliary Tauri binaries
        run: cargo build --release --features custom-protocol,wan-test --bin wt_tauri_wan_test --bin test_autoupdate --manifest-path src-tauri/Cargo.toml

      - name: Build Tauri app
        env:
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        run: npx tauri build --bundles nsis,updater

      - name: Generate latest.json
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $repo = "${{ github.repository }}"
          $bundleRoot = "src-tauri\target\release\bundle"
          $nsisBundleDir = Join-Path $bundleRoot "nsis"

          if (-not (Test-Path -LiteralPath $nsisBundleDir)) {
            throw "NSIS bundle directory not found: $nsisBundleDir"
          }

          $updaterArchive = Get-ChildItem -Path $nsisBundleDir -Filter "*.nsis.zip" -File | Select-Object -First 1
          if (-not $updaterArchive) {
            throw "Updater archive (*.nsis.zip) was not generated."
          }

          $signaturePath = "$($updaterArchive.FullName).sig"
          if (-not (Test-Path -LiteralPath $signaturePath)) {
            throw "Updater signature file not found: $signaturePath"
          }

          $signature = (Get-Content -LiteralPath $signaturePath -Raw).Trim()
          $notes = @"
${{ steps.release_notes.outputs.notes }}
"@
          $latestJsonPath = Join-Path $bundleRoot "latest.json"
          $downloadUrl = "https://github.com/$repo/releases/download/$tag/$($updaterArchive.Name)"
          $pubDate = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")

          $manifest = [ordered]@{
            version = $tag
            notes = $notes.Trim()
            pub_date = $pubDate
            platforms = [ordered]@{
              "windows-x86_64-nsis" = [ordered]@{
                url = $downloadUrl
                signature = $signature
              }
            }
          }

          $manifest | ConvertTo-Json -Depth 6 | Out-File -FilePath $latestJsonPath -Encoding utf8

      - name: Create Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.ref_name }}"
          $notes = "${{ steps.release_notes.outputs.notes }}"
          $notes | Out-File -FilePath "release_notes.md" -Encoding utf8

          gh release view $tag 1>$null 2>$null
          if ($LASTEXITCODE -eq 0) {
            gh release edit $tag --title "SlasshyVault $tag" --notes-file "release_notes.md"
          } else {
            gh release create $tag --title "SlasshyVault $tag" --notes-file "release_notes.md" --draft=$false
          }

          $bundles = Get-ChildItem -Path "src-tauri\target\release\bundle" -Recurse -File
          foreach ($file in $bundles) {
            gh release upload $tag $file.FullName --clobber
          }
