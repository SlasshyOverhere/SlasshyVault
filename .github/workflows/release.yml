name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [windows-latest]

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install dependencies
        run: npm ci

      - name: Prebuild WAN test binary
        run: cargo build --manifest-path src-tauri/Cargo.toml --release --bin wt_tauri_wan_test --features wan-test

      - name: Generate release notes
        id: release_notes
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          git fetch --tags --force
          $previousTag = $null
          try {
            $previousTag = (git describe --tags --abbrev=0 "$tag^" 2>$null).Trim()
          } catch {}

          if ($previousTag) {
            $changes = git log "$previousTag..$tag" --pretty=format:"- %s (%h)"
            if (-not $changes) {
              $changes = "- No commit messages found between $previousTag and $tag."
            }
            $notes = "## What's Changed`n`n$changes`n`n**Full Changelog**: https://github.com/${{ github.repository }}/compare/$previousTag...$tag"
          } else {
            $changes = git log "$tag" --pretty=format:"- %s (%h)"
            if (-not $changes) {
              $changes = "- Initial tagged release."
            }
            $notes = "## What's Changed`n`n$changes"
          }

          "notes<<EOF" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          $notes | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "EOF" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
          VITE_AI_SIGNATURE_SECRET: ${{ secrets.VITE_AI_SIGNATURE_SECRET }}
        with:
          args: --bundles nsis,updater
          tagName: ${{ github.ref_name }}
          releaseName: 'StreamVault ${{ github.ref_name }}'
          releaseBody: ${{ steps.release_notes.outputs.notes }}
          releaseDraft: false
          prerelease: false
