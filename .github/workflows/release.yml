name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [windows-latest]

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Run frontend tests
        run: pnpm test

      - name: Type check
        run: pnpm exec tsc --noEmit

      - name: Run lint
        run: pnpm run lint

      - name: Generate release notes
        id: release_notes
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          git fetch --tags --force
          $previousTag = $null
          try {
            $previousTag = (git describe --tags --abbrev=0 "$tag^" 2>$null).Trim()
          } catch {}

          $body = @{
            tag_name = $tag
          }
          if ($previousTag) {
            $body.previous_tag_name = $previousTag
          }

          $headers = @{
            Authorization = "Bearer ${{ secrets.GITHUB_TOKEN }}"
            Accept = "application/vnd.github+json"
            "X-GitHub-Api-Version" = "2022-11-28"
          }

          $response = Invoke-RestMethod -Method Post -Uri "https://api.github.com/repos/${{ github.repository }}/releases/generate-notes" -Headers $headers -Body ($body | ConvertTo-Json)
          $notes = $response.body
          if (-not $notes) {
            $notes = "## What's Changed`n`n- Release notes were not generated."
          }

          "notes<<EOF" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          $notes | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "EOF" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Build Tauri app
        env:
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        run: npx tauri build --bundles msi

      - name: Create Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.ref_name }}"
          $notes = "${{ steps.release_notes.outputs.notes }}"
          $notes | Out-File -FilePath "release_notes.md" -Encoding utf8
          gh release create $tag --title "SlasshyVault $tag" --notes-file "release_notes.md" --draft=$false
          $bundles = Get-ChildItem -Path "src-tauri\target\release\bundle" -Recurse -File
          foreach ($file in $bundles) {
            gh release upload $tag $file.FullName --clobber
          }
